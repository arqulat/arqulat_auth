# ─── Application ─────────────────────────────────────────────────
spring.application.name=auth-test

# ─── Database (H2 In-Memory) ────────────────────────────────────
# Creates the 'auth' schema at startup to match the production PostgreSQL schema.
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;INIT=CREATE SCHEMA IF NOT EXISTS auth
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────
spring.jpa.properties.hibernate.default_schema=auth
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ─── JWT ─────────────────────────────────────────────────────────
# A test-only Base64-encoded 256-bit key. NEVER use this in production.
application.security.jwt.secret-key=dGVzdFNlY3JldEtleVRoYXRJc0xvbmdFbm91Z2hGb3JIZW0=
application.security.jwt.expiration=3600000

# ─── Cookie ──────────────────────────────────────────────────────
app.cookie.domain=localhost
app.cookie.max-age=3600

# ─── App ─────────────────────────────────────────────────────────
app.frontend.url=http://localhost:3000

# ─── Google OAuth (dummy values so Spring context loads in tests) ─
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile
