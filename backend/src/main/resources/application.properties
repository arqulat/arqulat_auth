spring.application.name=auth
spring.config.import=optional:file:.env[.properties]


spring.datasource.url=${DB_URL:jdbc:postgresql://db.llfcpjoysmehsrgevdof.supabase.co:5432/postgres?currentSchema=public}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.properties.hibernate.default_schema=public


# For development, you can let Hibernate create the tables automatically based on your models.
# Change this to 'validate' or 'none' in production!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=${JWT_EXPIRATION:604800000}
app.cookie.max-age=${COOKIE_MAX_AGE:604800}

# App-level config
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
app.cookie.domain=${COOKIE_DOMAIN:localhost}
# .arqulat.com

# Google OAuth2 Credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile