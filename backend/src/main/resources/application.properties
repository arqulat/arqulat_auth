server.port=${PORT:8080}
spring.application.name=auth
spring.config.import=optional:file:.env[.properties]


spring.datasource.url=${DATABASE_URL:jdbc:postgresql://db.llfcpjoysmehsrgevdof.supabase.co:5432/postgres?currentSchema=public}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver


spring.jpa.properties.hibernate.default_schema=public


# For development, you can let Hibernate create the tables automatically based on your models.
# Change this to 'validate' or 'none' in production!
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.jpa.show-sql=true

application.security.jwt.secret-key=${JWT_SECRET}
application.security.jwt.expiration=${JWT_EXPIRATION:604800000}
app.cookie.max-age=${COOKIE_MAX_AGE:604800}

# App-level config
app.frontend.url=${FRONTEND_URL:https://www.arqulat.com/}
app.cookie.domain=${COOKIE_DOMAIN:.arqulat.com}


# Google OAuth2 Credentials
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile